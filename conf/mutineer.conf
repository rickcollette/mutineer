# Minimal config (key=value)
port=2929
bind=0.0.0.0
db_path=data/mutineer.db
menu_main=menus/main.mnu
idle_timeout_sec=600
motd=art/motd.ans
bbs_name=Mutineer BBS
sysop_name=Sysop
data_path=data
logs_path=logs/mutineer.log
art_path=art
session_time_limit_min=60
hostname=localhost # This is the name that will be displayed in the BBS directory, and also used for the telnet banner. If you are running behind a NAT, this should be your public hostname or IP address.

# BBS Directory configuration (this connects to the BBS directory server, and posts your BBS information to it)
bbs_dir_enabled=1
bbs_dir_server=mutineerbbs.com
bbs_dir_show_sysop=1
bbs_dir_show_bbs_name=1
bbs_dir_show_connections=1
bbs_dir_show_hostname=1

# Console / WFC dashboard configuration
console_enabled=1
console_bind=127.0.0.1
console_port=2931
console_idle_timeout_sec=600
# WFC display compatibility keys used by mutineer-console
# wfc_node_num=1
# wfc_status_idle_char=I
# wfc_status_logging_char=L
# wfc_status_online_char=A
# wfc_status_chat_char=S
wfc_shell_enabled=0
wfc_shell_command=

# Login rate limiting (relaxed for testing)
login_window_sec=10
login_max_attempts=100

# Plugin configuration
plugins_enabled=true
plugins_dir=plugins
plugins_allowlist=
plugins_denylist=
door_session_hmac_secret=ff308891fed6d8c3ebe44b4301328fad4e9bd27b26946a5b313520be09ea6952
door_cleanup_on_exit=1
door_janitor_interval_sec=60
door_stale_age_sec=300
password_upgrade=0
