# Docker config for the standalone WFC console service.
# Run the daemon normally, then open:
#   docker exec -it <container> /opt/mutineer/bin/mutineer-console -c conf/mutineer.wfc.conf
port=2929
bind=0.0.0.0
db_path=data/mutineer.db
menu_main=menus/main.mnu
idle_timeout_sec=600
motd=art/motd.ans
bbs_name=Mutineer BBS
sysop_name=Sysop
data_path=data
logs_path=logs/mutineer.log
art_path=art
session_time_limit_min=60

wfc_enabled=0
console_enabled=1
console_bind=127.0.0.1
console_port=2931
console_idle_timeout_sec=600
wfc_refresh_ms=1000
wfc_blank_sec=0
scheduler_enabled=1
scheduler_tick_sec=30

login_window_sec=10
login_max_attempts=100
password_upgrade=1
default_credits=5000
default_file_points=0

plugins_enabled=true
plugins_dir=plugins
