# Docker config with WFC console (requires docker run -it)
port=2929
bind=0.0.0.0
db_path=data/mutineer.db
menu_main=menus/main.mnu
idle_timeout_sec=600
motd=art/motd.ans
bbs_name=Mutineer BBS
sysop_name=Sysop
data_path=data
logs_path=logs/mutineer.log
art_path=art
session_time_limit_min=60

wfc_enabled=1
wfc_refresh_ms=1000
wfc_blank_sec=0
scheduler_enabled=1
scheduler_tick_sec=30

login_window_sec=10
login_max_attempts=100
password_upgrade=1
default_credits=5000
default_file_points=0

plugins_enabled=true
plugins_dir=plugins
