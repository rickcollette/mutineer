# Docker runtime configuration
port=2929
bind=0.0.0.0
db_path=data/mutineer.db
menu_main=menus/main.mnu
idle_timeout_sec=600
motd=art/motd.ans
bbs_name=Mutineer BBS
sysop_name=Sysop
data_path=data
logs_path=logs/mutineer.log
art_path=art
session_time_limit_min=60

# No local TTY in container. The old local WFC thread is disabled; use
# docker exec -it <container> /opt/mutineer/bin/mutineer-console -c conf/mutineer.docker.conf
# or intentionally publish console_port for trusted admin access.
wfc_enabled=0
console_enabled=1
console_bind=127.0.0.1
console_port=2931
console_idle_timeout_sec=600
scheduler_enabled=1
scheduler_tick_sec=30

login_window_sec=10
login_max_attempts=100
password_upgrade=0
default_credits=5000
default_file_points=0

plugins_enabled=true
plugins_dir=plugins
